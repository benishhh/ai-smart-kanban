<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Smart Kanban</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>⚙️ AI Smart Kanban</h1>
    <div class="ai-controls">
      <input type="text" id="ai-input" placeholder="Wpisz cel i pozwól AI rozbić go na zadania...">
      <button id="ai-btn"> Wygeneruj Workflow z AI</button>
    </div>
  </header>

  <main class="kanban-board">
    <div class="column" data-status="todo">
      <h2>Do zrobienia</h2>
      <div class="task-list" id="todo-list"></div>
    </div>
    
    <div class="column" data-status="inprogress">
      <h2>W trakcie</h2>
      <div class="task-list" id="inprogress-list"></div>
    </div>
    
    <div class="column" data-status="done">
      <h2>Zakończone</h2>
      <div class="task-list" id="done-list"></div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
